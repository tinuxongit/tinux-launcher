name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Tinux Launcher ${GITHUB_REF_NAME}" \
            --notes "Prebuilt Tinux Launcher binaries for pnpm installs."

  build:
    name: Build ${{ matrix.asset }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: tinux-launcher-windows-x64.exe
            bin: target/release/tinux-launcher.exe

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Compute cache key
        id: cache-key
        shell: bash
        run: |
          # Strip the version line for our own workspace package from
          # Cargo.lock before hashing — otherwise every release-tag version
          # bump invalidates the cache and we eat a full ~4 min recompile.
          lock_hash=$(sed '/^name = "tinux-launcher"$/{n;/^version = /d;}' Cargo.lock | sha256sum | awk '{print $1}')
          rustc_hash=$(rustc -vV | sha256sum | awk '{print $1}')
          echo "key=cargo-${{ runner.os }}-${rustc_hash:0:12}-${lock_hash:0:32}" >> "$GITHUB_OUTPUT"

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Build
        run: cargo build --release --locked
      - name: Prepare asset
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.bin }}" "dist/${{ matrix.asset }}"
          chmod +x "dist/${{ matrix.asset }}" || true
      - name: Upload release asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" "dist/${{ matrix.asset }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
