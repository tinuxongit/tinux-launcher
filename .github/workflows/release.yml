name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: tinux-launcher-windows-x64.exe
            bin: target/release/tinux-launcher.exe
          - os: ubuntu-latest
            asset: tinux-launcher-linux-x64
            bin: target/release/tinux-launcher
          - os: macos-13
            asset: tinux-launcher-macos-x64
            bin: target/release/tinux-launcher
          - os: macos-14
            asset: tinux-launcher-macos-arm64
            bin: target/release/tinux-launcher

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release --locked
      - name: Prepare asset
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.bin }}" "dist/${{ matrix.asset }}"
          chmod +x "dist/${{ matrix.asset }}" || true
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "Tinux Launcher ${GITHUB_REF_NAME}" \
            --notes "Prebuilt Tinux Launcher binaries for pnpm installs."
