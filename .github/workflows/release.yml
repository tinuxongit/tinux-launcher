name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Tinux Launcher ${GITHUB_REF_NAME}" \
            --notes "Prebuilt Tinux Launcher binaries for pnpm installs."

  build:
    name: Build ${{ matrix.asset }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: tinux-launcher-windows-x64.exe
            bin: target/release/tinux-launcher.exe

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Per-OS cache; keyed on Cargo.lock + rustc version.
          shared-key: release-${{ matrix.os }}
      - name: Build
        run: cargo build --release --locked
      - name: Prepare asset
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.bin }}" "dist/${{ matrix.asset }}"
          chmod +x "dist/${{ matrix.asset }}" || true
      - name: Upload release asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" "dist/${{ matrix.asset }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
